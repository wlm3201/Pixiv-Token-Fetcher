name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm i

      - name: Pack extension
        run: pnpm run repack

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release
          files: release/Pixiv-Token-Fetcher-v1.0.0.zip
