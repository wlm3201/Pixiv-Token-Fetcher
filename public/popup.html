<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixiv Token Fetcher</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="app">
      <button id="fetchtoken">获取Refresh Token</button>
      <button id="refreshtoken">刷新Access Token</button>
      <br />
      <span>状态: </span>
      <span id="status"></span>
      <br />
      <span>User ID: </span>
      <span id="uid"></span>
      <br />
      <span>Refresh Token: </span>
      <span id="rtoken"></span>
      <br />
      <span>Access Token: </span>
      <span id="atoken"></span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
